<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>El ChatBot de Viraliza - Zetup Academy</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#header{
padding:15px;
background:#111;
border-bottom:1px solid #333;
text-align:center;
}

#logo{
width:120px;
margin-bottom:5px;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.bot{
background:#1e1e1e;
padding:12px 18px;
border-radius:10px;
max-width:85%;
line-height: 1.5;
}

/* Animación de carga */
.typing {
    font-weight: bold;
    animation: blink 1s infinite;
    font-size: 20px;
}
@keyframes blink {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
}

/* Estilos Markdown IA */
.bot h1, .bot h2, .bot h3 { margin: 15px 0 8px 0; color: #2563eb; }
.bot p { margin-bottom: 10px; }
.bot ul, .bot ol { padding-left: 25px; margin-bottom: 10px; }
.bot li { margin-bottom: 5px; }

.user{
background:#2563eb;
padding:12px;
border-radius:10px;
max-width:70%;
align-self:flex-end;
}

#tools{
padding:10px;
background:#111;
border-top:1px solid #333;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content: center;
}

#inputArea{
display:flex;
padding:10px;
background:#111;
border-top:1px solid #333;
}

#inputUsuario{
flex:1;
padding:10px;
background:#1e1e1e;
border:none;
color:white;
border-radius:6px;
}

button{
padding:10px 16px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-weight: bold;
}

button:hover{
background:#1d4ed8;
}

.btn-wa { background: #25d366 !important; }
.btn-wa:hover { background: #128c7e !important; }

@media print {
    #header, #tools, #inputArea, .user { display: none !important; }
    body, #chat { background: white !important; color: black !important; height: auto !important; overflow: visible !important; }
    .bot { background: white !important; color: black !important; border: 1px solid #eee; max-width: 100% !important; box-shadow: none !important; }
    .bot h1, .bot h2, .bot h3 { color: #2563eb !important; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<div id="header">
<img src="/logo.png" id="logo">
<h2>ChatBot Estratégico - Zetup Academy</h2>
</div>

<div id="chat"></div>

<div id="tools">
<button onclick="generarCopies()">Generar copies</button>
<button onclick="generarCreativos()">Ideas de creativos</button>
<button onclick="descargarPDF()">Descargar PDF</button>
<button onclick="enviarWhatsAppAlUsuario()" class="btn-wa">Enviar Estrategia a mi WhatsApp</button>
</div>

<div id="inputArea">
<input id="inputUsuario" placeholder="Escribe aquí..." onkeypress="enterEnviar(event)">
<button onclick="enviar()">Enviar</button>
</div>

<script>
let paso = 0
let datos = {
    nombreCliente: "",
    telefono: "",
    nicho: "",
    tipo: "",
    presupuesto: "",
    pais: "",
    objetivo: "",
    estrategiaCompleta: "" // Guardamos la respuesta de la IA aquí
}

function bot(texto){
    let chat = document.getElementById("chat")
    let div = document.createElement("div")
    div.className = "bot"
    if(!texto){
        div.innerHTML = '<span class="typing">...</span>';
    } else {
        div.innerHTML = marked.parse(texto);
    }
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
    return div;
}

function user(texto){
    let chat = document.getElementById("chat")
    let div = document.createElement("div")
    div.className="user"
    div.innerText=texto
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
}

function enterEnviar(e){
    if(e.key==="Enter") enviar();
}

bot("¡Hola! 👋 Bienvenido a la herramienta estratégica de **Zetup Academy**.")
bot("Te ayudaré a diseñar la estrategia que usarás en el curso.")
bot("Primero, ¿cuál es tu nombre?")

async function enviar() {
    let input = document.getElementById("inputUsuario");
    let texto = input.value.trim();
    if (texto === "") return;

    user(texto);
    input.value = "";

    if (paso === 0) {
        datos.nombreCliente = texto;
        bot(`Genial ${texto}. ¿A qué WhatsApp quieres que te enviemos el resumen final? (Código de país + número)`);
        paso++;
        return;
    }

    if (paso === 1) {
        datos.telefono = texto.replace(/\D/g,'');
        bot("¿Cuál es el nicho o producto que vamos a escalar?");
        paso++;
        return;
    }

    if (paso === 2) {
        datos.nicho = texto;
        bot("¿Qué tipo de negocio es? (ecommerce, servicio, local)");
        paso++;
        return;
    }

    if (paso === 3) {
        datos.tipo = texto;
        bot("¿Presupuesto mensual estimado para pauta?");
        paso++;
        return;
    }

    if (paso === 4) {
        datos.presupuesto = texto;
        bot("¿País o ciudad objetivo?");
        paso++;
        return;
    }

    if (paso === 5) {
        datos.pais = texto;
        bot("¿Cuál es el objetivo principal? (Ventas, Leads, Mensajes)");
        paso++;
        return;
    }

    if (paso === 6) {
        datos.objetivo = texto;
        bot("¡Entendido! Estamos procesando tu estrategia de nivel experto...");
        
        let burbujaCarga = bot(""); 

        let prompt = `Actúa como un Senior Media Buyer de Viraliza. Genera una estrategia de Meta Ads para ${datos.nombreCliente}. Nicho: ${datos.nicho}, Presupuesto: ${datos.presupuesto}, Objetivo: ${datos.objetivo}. Estructura la respuesta con Títulos claros (Campaña, Segmentación, Creativos) y usa listas.`;

        try {
            let respuesta = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: prompt })
            });
            let data = await respuesta.json();
            
            datos.estrategiaCompleta = data.reply; // Guardamos para el envío
            burbujaCarga.innerHTML = marked.parse(data.reply);
            guardarCliente();
            
            bot("¡Listo! Ya puedes descargar tu PDF o recibir el resumen en tu WhatsApp con los botones de abajo. 👇");
        } catch (error) {
            burbujaCarga.innerText = "Error de conexión. Intenta de nuevo.";
        }
    }
}

function enviarWhatsAppAlUsuario() {
    if(!datos.telefono || !datos.estrategiaCompleta) {
        alert("Primero completa la estrategia para poder enviarla.");
        return;
    }

    // Limpiamos un poco el texto para que no sea excesivo en WA
    let resumenWA = datos.estrategiaCompleta
        .replace(/[#*]/g, '') // Quitamos caracteres de Markdown
        .substring(0, 1500); // Limitamos longitud para evitar errores de URL

    let mensajeWA = `¡Hola ${datos.nombreCliente}! 👋\n\n` +
                    `Aquí tienes tu estrategia de *Zetup Academy*:\n\n` +
                    `${resumenWA}...\n\n` +
                    `🚀 *¡A darle con toda a esas campañas!*`;
    
    let url = `https://api.whatsapp.com/send?phone=${datos.telefono}&text=${encodeURIComponent(mensajeWA)}`;
    window.open(url, '_blank');
}

async function generarCopies(){
    let burbuja = bot("");
    let prompt = `Genera 3 copies persuasivos AIDA para: ${datos.nicho}.`;
    let r = await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:prompt})
    });
    let data = await r.json();
    burbuja.innerHTML = marked.parse(data.reply);
}

async function generarCreativos(){
    let burbuja = bot("");
    let prompt = `Genera 5 ideas de creativos para: ${datos.nicho}.`;
    let r = await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:prompt})
    });
    let data = await r.json();
    burbuja.innerHTML = marked.parse(data.reply);
}

function descargarPDF() {
    const chat = document.getElementById("chat");
    const tituloPDF = document.createElement("div");
    tituloPDF.style.textAlign = "center";
    tituloPDF.style.marginBottom = "30px";
    tituloPDF.innerHTML = `<h1 style="color: #2563eb;">Zetup Academy x Viraliza</h1><h2>Estrategia para: ${datos.nombreCliente}</h2><hr>`;
    chat.prepend(tituloPDF);
    window.print();
    chat.removeChild(tituloPDF);
}

function guardarCliente(){
    let clientes = JSON.parse(localStorage.getItem("clientes") || "[]")
    clientes.push(datos);
    localStorage.setItem("clientes", JSON.stringify(clientes));
}
</script>
</body>
</html>
