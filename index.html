<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>El ChatBot de Viraliza</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#header{
padding:15px;
background:#111;
border-bottom:1px solid #333;
text-align:center;
}

#logo{
width:120px;
margin-bottom:5px;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.bot{
background:#1e1e1e;
padding:12px 18px;
border-radius:10px;
max-width:85%;
line-height: 1.5;
}

/* Estilos para el contenido que genera la IA */
.bot h1, .bot h2, .bot h3 { margin: 15px 0 8px 0; color: #2563eb; }
.bot p { margin-bottom: 10px; }
.bot ul, .bot ol { padding-left: 25px; margin-bottom: 10px; }
.bot li { margin-bottom: 5px; }

.user{
background:#2563eb;
padding:12px;
border-radius:10px;
max-width:70%;
align-self:flex-end;
}

#tools{
padding:10px;
background:#111;
border-top:1px solid #333;
display:flex;
gap:10px;
flex-wrap:wrap;
}

#inputArea{
display:flex;
padding:10px;
background:#111;
border-top:1px solid #333;
}

#inputUsuario{
flex:1;
padding:10px;
background:#1e1e1e;
border:none;
color:white;
border-radius:6px;
}

button{
padding:10px 16px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

@media print {
    #header, #tools, #inputArea, .user {
        display: none !important;
    }

    body, #chat {
        background: white !important;
        color: black !important;
        height: auto !important;
        overflow: visible !important;
    }

    .bot {
        background: white !important;
        color: black !important;
        border: 1px solid #eee;
        max-width: 100% !important;
        box-shadow: none !important;
        page-break-inside: avoid;
    }

    .bot h1, .bot h2, .bot h3 {
        color: #2563eb !important;
    }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<div id="header">
<img src="/logo.png" id="logo">
<h2>El ChatBot de Viraliza</h2>
</div>

<div id="chat"></div>

<div id="tools">
<button onclick="generarCopies()">Generar copies</button>
<button onclick="generarCreativos()">Ideas de creativos</button>
<button onclick="descargarPDF()">Descargar estrategia PDF</button>
</div>

<div id="inputArea">
<input id="inputUsuario" placeholder="Escribe aquí..." onkeypress="enterEnviar(event)">
<button onclick="enviar()">Enviar</button>
</div>

<script>
let paso = 0
let datos = {
    nombreCliente: "",
    nicho: "",
    tipo: "",
    presupuesto: "",
    pais: "",
    objetivo: ""
}

function bot(texto){
    let chat = document.getElementById("chat")
    let div = document.createElement("div")
    div.className = "bot"
    div.innerText = "Escribiendo..."
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight

    setTimeout(()=>{
        div.innerHTML = marked.parse(texto);
        chat.scrollTop = chat.scrollHeight
    },600)
}

function user(texto){
    let chat = document.getElementById("chat")
    let div = document.createElement("div")
    div.className="user"
    div.innerText=texto
    chat.appendChild(div)
    chat.scrollTop = chat.scrollHeight
}

function enterEnviar(e){
    if(e.key==="Enter"){
        enviar()
    }
}

bot("Hola 👋 Soy el ChatBot de Viraliza")
bot("Te ayudaré a crear tu estrategia de Meta Ads")
bot("Para empezar, ¿Cuál es tu nombre o el de tu empresa?")

async function enviar() {
    let input = document.getElementById("inputUsuario");
    let texto = input.value.trim();

    if (texto === "") return;

    user(texto);
    input.value = "";

    if (paso === 0) {
        datos.nombreCliente = texto;
        bot(`Mucho gusto, ${texto}. Ahora dime: ¿Cuál es tu nicho de negocio?`);
        paso++;
        return;
    }

    if (paso === 1) {
        datos.nicho = texto;
        bot("¿Qué tipo de negocio tienes? (ecommerce, servicio, local)");
        paso++;
        return;
    }

    if (paso === 2) {
        datos.tipo = texto;
        bot("¿Cuál es tu presupuesto mensual para anuncios?");
        paso++;
        return;
    }

    if (paso === 3) {
        datos.presupuesto = texto;
        bot("¿En qué país vendes?");
        paso++;
        return;
    }

    if (paso === 4) {
        datos.pais = texto;
        bot("¿Cuál es tu objetivo? (ventas, leads, mensajes)");
        paso++;
        return;
    }

    if (paso === 5) {
        datos.objetivo = texto;
        bot("Analizando nicho y creando tu estrategia personalizada...");

        let prompt = `
            Eres experto en Meta Ads para la agencia Viraliza. 
            Analiza este negocio y genera una estrategia completa y profesional para el cliente: ${datos.nombreCliente}.
            Usa títulos (###), negritas (**) y listas.

            Nicho: ${datos.nicho}
            Tipo: ${datos.tipo}
            Presupuesto: ${datos.presupuesto}
            Pais: ${datos.pais}
            Objetivo: ${datos.objetivo}

            Debes generar:
            - Estructura de campañas detallada
            - Segmentación de público
            - Tipos de anuncios recomendados
            - Distribución de presupuesto sugerida
        `;

        try {
            let respuesta = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: prompt })
            });

            let data = await respuesta.json();
            bot(data.reply);
            guardarCliente();
        } catch (error) {
            bot("Lo siento, hubo un error al conectar con la IA. Intenta de nuevo.");
        }
    }
}

async function generarCopies(){
    bot("Generando copies publicitarios...")
    let prompt = `Genera 3 copies persuasivos AIDA para: ${datos.nicho} en ${datos.pais}.`
    let r = await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:prompt})
    })
    let data = await r.json()
    bot(data.reply)
}

async function generarCreativos(){
    bot("Generando ideas de creativos...")
    let prompt = `Genera 5 ideas de creativos para: ${datos.nicho}.`
    let r = await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:prompt})
    })
    let data = await r.json()
    bot(data.reply)
}

function descargarPDF() {
    const chat = document.getElementById("chat");
    const tituloPDF = document.createElement("div");
    tituloPDF.style.textAlign = "center";
    tituloPDF.style.marginBottom = "30px";
    tituloPDF.innerHTML = `
        <h1 style="color: #2563eb; margin-bottom: 5px;">Viraliza Marketing</h1>
        <h2 style="color: #333;">Estrategia de Meta Ads para: ${datos.nombreCliente}</h2>
        <hr style="border: 1px solid #eee; margin: 20px 0;">
    `;
    chat.prepend(tituloPDF);
    window.print();
    chat.removeChild(tituloPDF);
}

function guardarCliente(){
    let clientes = JSON.parse(localStorage.getItem("clientes") || "[]")
    clientes.push(datos)
    localStorage.setItem("clientes", JSON.stringify(clientes))
}
</script>
</body>
</html>
