<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>El ChatBot de Viraliza</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#header{
padding:15px;
background:#111;
border-bottom:1px solid #333;
text-align:center;
}

#logo{
width:120px;
margin-bottom:8px;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.bot{
background:#1e1e1e;
padding:12px;
border-radius:10px;
max-width:70%;
}

.user{
background:#2563eb;
padding:12px;
border-radius:10px;
max-width:70%;
align-self:flex-end;
}

#tools{
padding:10px;
background:#111;
border-top:1px solid #333;
display:flex;
gap:10px;
flex-wrap:wrap;
}

#inputArea{
display:flex;
padding:10px;
background:#111;
border-top:1px solid #333;
}

#inputUsuario{
flex:1;
padding:10px;
background:#1e1e1e;
border:none;
color:white;
border-radius:6px;
}

button{
padding:10px 16px;
background:#2563eb;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<div id="header">
<img id="logo" src="logo.png">
<h2>El ChatBot de Viraliza</h2>
</div>

<div id="chat"></div>

<div id="tools">
<button onclick="generarCopies()">Generar copies</button>
<button onclick="generarCreativos()">Ideas de creativos</button>
<button onclick="descargarPDF()">Descargar estrategia PDF</button>
</div>

<div id="inputArea">
<input id="inputUsuario" placeholder="Escribe aquí..." onkeypress="enterEnviar(event)">
<button onclick="enviar()">Enviar</button>
</div>

<script>

let paso = 0

let datos = {
nicho:"",
tipo:"",
presupuesto:"",
pais:"",
objetivo:""
}

function bot(texto){

let chat = document.getElementById("chat")

let typing = document.createElement("div")
typing.className = "bot"
typing.innerText = "Escribiendo..."

chat.appendChild(typing)
chat.scrollTop = chat.scrollHeight

setTimeout(()=>{
typing.innerText = texto
},800)

}

function user(texto){

let chat = document.getElementById("chat")
chat.innerHTML += `<div class="user">${texto}</div>`
chat.scrollTop = chat.scrollHeight

}

function enterEnviar(event){
if(event.key === "Enter"){
enviar()
}
}

bot("Hola 👋 Soy el ChatBot de Viraliza")
bot("Te ayudaré a crear tu estrategia de Meta Ads")
bot("Primero dime: ¿Cuál es tu nicho de negocio?")

async function enviar(){

let input = document.getElementById("inputUsuario")
let texto = input.value

if(texto==="") return

user(texto)

if(paso===0){
datos.nicho = texto
bot("¿Qué tipo de negocio tienes? (ecommerce, servicio, local)")
paso++
}

else if(paso===1){
datos.tipo = texto
bot("¿Cuál es tu presupuesto mensual para anuncios?")
paso++
}

else if(paso===2){
datos.presupuesto = texto
bot("¿En qué país vendes?")
paso++
}

else if(paso===3){
datos.pais = texto
bot("¿Cuál es tu objetivo? (ventas, leads, mensajes)")
paso++
}

else if(paso===4){

datos.objetivo = texto

bot("Analizando nicho...")

setTimeout(()=>{
bot("Analizando competencia...")
},1000)

setTimeout(()=>{
bot("Creando estructura de campañas...")
},2000)

setTimeout(()=>{
bot("Generando estrategia...")
},3000)

let mensaje = `
Nicho: ${datos.nicho}
Tipo: ${datos.tipo}
Presupuesto: ${datos.presupuesto}
Pais: ${datos.pais}
Objetivo: ${datos.objetivo}
`

let respuesta = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
message:mensaje
})
})

let data = await respuesta.json()

bot(data.reply)

}

input.value=""

}

async function generarCopies(){

bot("Generando copies publicitarios...")

let prompt = `
Genera 3 copies publicitarios para Meta Ads para:

Nicho: ${datos.nicho}
Tipo: ${datos.tipo}
Pais: ${datos.pais}
`

let respuesta = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
message:prompt
})
})

let data = await respuesta.json()

bot(data.reply)

}

async function generarCreativos(){

bot("Generando ideas de creativos...")

let prompt = `
Genera 5 ideas de creativos para anuncios de Meta Ads para:

Nicho: ${datos.nicho}
Tipo: ${datos.tipo}
`

let respuesta = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
message:prompt
})
})

let data = await respuesta.json()

bot(data.reply)

}

function descargarPDF(){
window.print()
}

</script>

</body>
</html>
